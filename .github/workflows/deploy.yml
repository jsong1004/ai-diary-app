name: Deploy to Firebase Hosting (production)

# main 브랜치에 푸시되면 프로덕션(라이브 채널)으로 자동 배포합니다.
# 수동 실행(workflow_dispatch)도 지원합니다.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ai-diary-js.web.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        env:
          # 빌드 시점에 Vite로 주입되는 환경 변수.
          # API 키는 리포지토리 시크릿, 모델명은 변수(없으면 기본값) 사용.
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_OPENROUTER_MODEL: ${{ vars.VITE_OPENROUTER_MODEL || 'nvidia/nemotron-3-nano-30b-a3b:free' }}
          VITE_OPENROUTER_IMAGE_MODEL: ${{ vars.VITE_OPENROUTER_IMAGE_MODEL || 'google/gemini-2.5-flash-image' }}
          VITE_OPENROUTER_AUDIO_MODEL: ${{ vars.VITE_OPENROUTER_AUDIO_MODEL || 'nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free' }}
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ai-diary-js
          channelId: live
